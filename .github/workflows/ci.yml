name: ci

"on":
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Do not init the e2e submodule: it is an SSH-only fixtures repo with no
        # Go sources, so `go test ./...` never needs it and cloning would fail.
        with:
          submodules: false
      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          # go + golangci-lint for the toolchain; helm + kustomize so the
          # render integration tests actually run instead of t.Skip()-ing.
          # kind/kubectl/yq stay out (e2e-only).
          install_args: go golangci-lint helm kustomize
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        # -v so t.Skip()'d integration tests are visible in the log; combined
        # with mise installing helm+kustomize, none should skip anymore.
        run: go test -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          install_args: go golangci-lint
      - name: Lint
        run: golangci-lint run ./...
