name: argocdf plan

# Atlantis-style ArgoCD diff for PRs: comment `argocdf` (or `argocdf plan`) on a
# PR and this workflow renders manifests from the base branch and the PR head
# with argocdf (https://github.com/rgeraskin/argocdf), then posts the semantic
# diff of all affected ArgoCD Applications as new PR comment(s) per run — a
# plan too large for GitHub's comment cap is split across several comments.
#
# This is a fuller, placeholders you must adapt for your setup
#   - <your-org>            GitHub org (and private GHCR namespace, if any)
#   - <self-hosted-runner>  a runner that can reach your Kubernetes API server
#   - the "Get kubeconfig" step (shown for AWS EKS; swap for your provider)
#   - secrets: AWS_*, GH_TOKEN (only if you pull private OCI Helm chart deps)

on: # yamllint disable-line rule:truthy
  # issue_comment and workflow_dispatch only fire for workflow files already on
  # the default branch, so a change to this file can't be exercised from its own
  # PR. To debug such a change, uncomment the pull_request trigger below and push
  # to the PR: it runs the job on every push to the PR head (the job already
  # resolves the PR number trigger-agnostically). Re-comment it before merging.
  #
  # pull_request: # yamllint disable-line rule:empty-values

  issue_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to plan
        required: true

# A permissions block sets every unlisted scope to `none`, so these are the
# complete set the default GITHUB_TOKEN is granted. (The GHCR step uses the
# GH_TOKEN PAT instead, which carries its own scopes.)
permissions:
  contents: read # read repo metadata; least-privilege floor for the workflow token
  packages: read # helm chart dependencies live in a private OCI registry (optional)
  pull-requests: write # github-script posts the diff comment(s); peter-evans posts the failure comment
  issues: write # github-script adds the 'argocdf' label and the 👀 reaction (issues REST API)

concurrency:
  # One in-flight run per PR. The PR number is read from whichever trigger fired
  # (issue.number for a comment, pull_request.number for the test trigger,
  # github.event.inputs.pr_number for a manual dispatch), so every run for a PR
  # lands in the same group; cancel-in-progress then supersedes an older run when
  # a second `argocdf plan` (or dispatch) arrives. Each run posts a FRESH comment
  # (no upsert) after collapsing this PR's earlier argocdf comments as OUTDATED,
  # so serialising runs keeps that collapse-then-post sequence from interleaving
  # — e.g. two runs posting competing diffs, or one collapsing the other's
  # brand-new comment.
  group: argocdf-plan-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Render ArgoCD app diffs for the PR
    # For comment triggers: only a PR comment whose exact body is 'argocdf' or
    # 'argocdf plan', from an org member/owner/collaborator. Other triggers pass
    # through.
    if: >-
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request &&
       contains(fromJSON('["argocdf", "argocdf plan"]'), github.event.comment.body) &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: <self-hosted-runner> # must be able to reach your Kubernetes API server
    environment: admin # holds the cluster-access secrets (AWS_* below)
    timeout-minutes: 30
    env:
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number }}
    steps:
      # Refuse to run for fork PRs. This job holds the environment's cloud creds
      # and the GH_TOKEN PAT, and later steps execute PR-authored content (helm
      # dependency build, argocdf render, mise-installed tooling) — running a
      # fork's code here would expose those secrets (the "pwn request" class).
      # The author-association gate above only checks who *commented*, not whose
      # *code* is checked out, so it can't cover this. Runs before checkout so
      # untrusted code never executes if it trips.
      # It also resolves the head to an immutable commit SHA that the checkout
      # below pins to (instead of the mutable refs/pull/<n>/head), which closes
      # the TOCTOU window: the ref can't be repointed between this check and the
      # checkout.
      - name: Refuse fork PRs and pin head SHA
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pr = Number(process.env.PR_NUMBER);
            // workflow_dispatch inputs are free-text strings; fail fast with a
            // clear message instead of a cryptic pulls.get error on NaN.
            if (!Number.isInteger(pr) || pr <= 0) {
              core.setFailed(
                `Invalid PR number: ${JSON.stringify(process.env.PR_NUMBER)}`,
              );
              return;
            }
            const { data } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: pr,
            });
            const head = data.head.repo?.full_name; // null if the fork was deleted
            const base = data.base.repo.full_name;
            if (head !== base) {
              core.setFailed(
                `Refusing to run: PR #${pr} head repo (${head}) is a fork of ` +
                  `${base}. This workflow executes PR code with privileged ` +
                  `secrets and only runs for same-repo branches.`,
              );
              return;
            }
            // Hand the exact commit to the checkout step as an env var. Pinning
            // to this SHA (vs the mutable ref) avoids the check-then-checkout
            // TOCTOU on the PR head.
            fs.appendFileSync(process.env.GITHUB_ENV, `PR_HEAD_SHA=${data.head.sha}\n`);

      - name: Ack comment and label PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (context.eventName === 'issue_comment') {
              // instant "run started" feedback on the triggering comment.
              // Best-effort: a transient reaction error must not fail the plan.
              try {
                await github.rest.reactions.createForIssueComment({
                  ...context.repo,
                  comment_id: context.payload.comment.id,
                  content: 'eyes',
                });
              } catch (e) {
                core.warning(`reaction skipped: ${e.message}`);
              }
            }
            // to audit 'argocdf' behavior we label the PR with 'argocdf'.
            // The label itself is created once at rollout. Labelling is
            // ancillary to the plan, so a missing label (or transient error)
            // must not fail the run — swallow and warn.
            try {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: pr,
                labels: ['argocdf'],
              });
            } catch (e) {
              core.warning(`label skipped: ${e.message}`);
            }

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Immutable commit resolved by the guard step above, not the mutable
          # refs/pull/<n>/head — this is the TOCTOU-safe pin.
          ref: ${{ env.PR_HEAD_SHA }}
          # Use the default GITHUB_TOKEN (contents: read) for the checkout, not a
          # PAT: fetching the repo at a commit only needs repo read, so any PAT
          # stays reserved for the GHCR login (packages access the default token
          # lacks) — less PAT exposure in a job that runs PR-authored code.
          # Don't write the token into .git/config either: no later step does an
          # authenticated git op (argocdf only runs local `git merge-base`), so
          # leaving a token in the worktree is needless exposure.
          persist-credentials: false
          # argocdf resolves the base as `git merge-base origin/main HEAD` and
          # diffs that merge-base ("base" side) against HEAD ("target" side).
          # fetch-depth: 0 fetches all branches+tags and full history, which is
          # what makes both (a) the origin/main ref exist locally and (b) the
          # merge-base commit reachable. A shallow checkout has neither.
          fetch-depth: 0

      - name: Setup mise + install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: >-
            helm
            kustomize
            awscli
            github:rgeraskin/argocdf

      - name: Restore argocdf cache
        # Rolling cache of argocdf's render + downloaded-chart cache and helm's
        # repo/dependency cache.
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/argocdf
            ~/.cache/helm
          key: argocdf-${{ runner.os }}-${{ github.run_id }}
          restore-keys: argocdf-${{ runner.os }}-

      # --- Cluster access -----------------------------------------------------
      # argocdf lists ArgoCD Application resources from the cluster, so the
      # runner needs a working kubeconfig. The two steps below are one concrete
      # way (AWS EKS); replace them with whatever produces a kubeconfig for your
      # provider (gcloud container clusters get-credentials, az aks
      # get-credentials, a base64 KUBECONFIG secret, etc.).
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Get kubeconfig for cluster
        # Region is inherited from AWS_DEFAULT_REGION, which the credentials step
        # exports from secrets.AWS_DEFAULT_REGION — one source of truth, no drift.
        run: aws eks update-kubeconfig --name <your-cluster>

      # Only needed if your Helm charts pull dependencies from a PRIVATE OCI
      # registry: `helm dependency build` needs registry auth. A PAT with
      # read:packages is used here because the default workflow token may lack
      # cross-repo package access. Delete this step for public chart deps.
      - name: Login to GHCR for helm
        run: helm registry login ghcr.io --username ${{ github.actor }} --password-stdin <<< "${{ secrets.GH_TOKEN }}"

      - name: argocdf plan
        # repo-url / kustomize options can come from ARGOCDF_* env vars (see the
        # examples/github-actions/README.md note on keeping local runs identical
        # to CI). --concurrency 4 caps parallel helm renders: on a constrained
        # runner the default (numCPU) sees the node's cores and oversubscribes.
        # The `split` option keeps every output file under GitHub's 65,536-char
        # comment cap: a report that fits stays a single pr-comment.md; an
        # oversized one is split into self-contained parts (pr-comment.md,
        # pr-comment.2.md, ...) that the post step below publishes one comment
        # each.
        run: |
          argocdf --quiet \
            --base origin/main --target HEAD \
            --file md-unified,split:pr-comment.md \
            --concurrency 4

      - name: Upload full report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argocdf-report
          path: pr-comment*.md
          if-no-files-found: ignore

      # Collapse this PR's earlier argocdf comments as OUTDATED before posting
      # the new one, so the latest plan is the only expanded one while the
      # history stays on the PR (collapsed). Runs on success and failure, and
      # before both post steps, so it never minimizes the run's own new comment.
      # Matches by the marker argocdf embeds as the first line, restricted to
      # this workflow's bot author.
      - name: Collapse previous argocdf comments
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            const marker = '<!-- argocdf-diff -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo, issue_number: pr, per_page: 100,
            });
            for (const c of comments) {
              if (c.user?.login !== 'github-actions[bot]' || !c.body?.includes(marker)) continue;
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                     minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                       minimizedComment { isMinimized }
                     }
                   }`,
                  { id: c.node_id },
                );
              } catch (e) {
                // already minimized, or transient — not worth failing the run
                core.info(`skip minimizing comment ${c.id}: ${e.message}`);
              }
            }

      # Fresh comment(s) per run (no upsert) so results read top-to-bottom
      # under the triggering `argocdf plan` and the PR keeps a plan history.
      # An oversized plan arrives as several part files (argocdf's `split`
      # option); each is a self-contained document carrying the argocdf marker,
      # so the collapse step above minimizes every part of an outdated plan.
      - name: Post diff as PR comment(s)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pr = Number(process.env.PR_NUMBER);
            // Part 1 is pr-comment.md; argocdf numbers further parts
            // contiguously (pr-comment.2.md, pr-comment.3.md, ...).
            const files = ['pr-comment.md'];
            for (let i = 2; fs.existsSync(`pr-comment.${i}.md`); i++) {
              files.push(`pr-comment.${i}.md`);
            }
            for (const f of files) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: pr,
                body: fs.readFileSync(f, 'utf8'),
              });
            }

      - name: Report failure as PR comment
        if: failure()
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body: |
            <!-- argocdf-diff -->
            ## argocdf plan

            ❌ Plan failed — see the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for logs.
